services:
  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_PROJECT_ID: ${NEXT_PUBLIC_PROJECT_ID}
        NEXT_PUBLIC_REOWN_PROJECT_ID: ${NEXT_PUBLIC_REOWN_PROJECT_ID}
        NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ${NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID}
        NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
        NEXT_PUBLIC_4MICA_CORE_CONTRACT_ETH_SEPOLIA: ${NEXT_PUBLIC_4MICA_CORE_CONTRACT_ETH_SEPOLIA}
        NEXT_PUBLIC_4MICA_CORE_CONTRACT_BASE_SEPOLIA: ${NEXT_PUBLIC_4MICA_CORE_CONTRACT_BASE_SEPOLIA}
    image: 4mica-web:latest
    container_name: 4mica-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
    ports:
      - "${WEB_PORT:-8080}:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
