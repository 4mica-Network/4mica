name: Deploy 4mica Website

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Select environment to deploy to"
        required: true
        type: choice
        options:
          - dev
          - prod

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'prod' }}
    env:
      DEPLOY_ENV: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'prod' }}
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
      SERVER_USER: ${{ vars.SERVER_USER || 'mo' }}
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '~/var/www/4mica' }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          ssh-keyscan "$SERVER_HOST" >> ~/.ssh/known_hosts

      - name: Write remote web environment
        run: |
          set -euo pipefail
          ssh "$SERVER_USER@$SERVER_HOST" "mkdir -p $DEPLOY_PATH/apps/web"
          ssh "$SERVER_USER@$SERVER_HOST" "cat > $DEPLOY_PATH/apps/web/.env" <<EOF
          NEXT_PUBLIC_PROJECT_ID=${{ vars.NEXT_PUBLIC_PROJECT_ID }}
          NEXT_PUBLIC_REOWN_PROJECT_ID=${{ vars.NEXT_PUBLIC_REOWN_PROJECT_ID }}
          NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID=${{ vars.NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID }}
          NEXT_PUBLIC_BASE_URL=${{ vars.NEXT_PUBLIC_BASE_URL }}
          NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_4MICA_CORE_CONTRACT_ETH_SEPOLIA=${{ vars.NEXT_PUBLIC_4MICA_CORE_CONTRACT_ETH_SEPOLIA }}
          NEXT_PUBLIC_4MICA_CORE_CONTRACT_BASE_SEPOLIA=${{ vars.NEXT_PUBLIC_4MICA_CORE_CONTRACT_BASE_SEPOLIA }}
          WEB_PORT=${{ vars.WEB_PORT || '8080' }}
          EOF
          ssh "$SERVER_USER@$SERVER_HOST" "chmod 600 $DEPLOY_PATH/apps/web/.env"

      - name: Deploy web app with Docker Compose
        run: |
          set -euo pipefail
          if [ "$DEPLOY_ENV" = "dev" ]; then
            BRANCH="dev"
          else
            BRANCH="main"
          fi

          ssh "$SERVER_USER@$SERVER_HOST" bash -s -- "$DEPLOY_PATH" "$BRANCH" <<'EOF'
          set -euo pipefail
          DEPLOY_PATH="$1"
          BRANCH="$2"

          cd "$DEPLOY_PATH"
          git fetch origin "$BRANCH"
          git checkout "$BRANCH"
          git pull --ff-only origin "$BRANCH"

          cd apps/web
          docker compose --env-file .env down
          docker compose --env-file .env up -d --build --remove-orphans
          docker image prune -f
          docker compose ps
          EOF
