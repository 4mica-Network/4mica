name: New feature proposal
description: Propose a new feature to be added to 4mica
labels: ['enhancement', 'feature']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for your interest in 4mica and for taking the time to share your feature idea!
  - type: textarea
    id: feature-description
    attributes:
      label: Clear and concise description of the problem
      description: 'As a 4mica user or contributor, I want [goal / wish] so that [benefit]. If you intend to submit a PR for this issue, tell us in the description. Thanks!'
    validations:
      required: true
  - type: textarea
    id: suggested-solution
    attributes:
      label: Suggested solution
      description: Describe the implementation or behavior you would like to see.
    validations:
      required: true
  - type: textarea
    id: alternative
    attributes:
      label: Alternatives
      description: Clear and concise description of any alternative solutions or features you've considered.
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Any other context or screenshots about the feature request here.
  - type: checkboxes
    id: checkboxes
    attributes:
      label: Validations
      description: Before submitting the issue, please make sure you do the following
      options:
        - label: Follow our [Code of Conduct](https://github.com/4mica-Network/4mica/blob/main/CODE_OF_CONDUCT.md).
          required: true
        - label: Read the [Contributing Guidelines](https://github.com/4mica-Network/4mica/blob/main/CONTRIBUTING.md).
          required: true
        - label: Read the 4mica documentation.
          required: true
        - label: Check that there isn't already an issue requesting the same feature to avoid creating a duplicate.
          required: true
